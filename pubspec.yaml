name: chat_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  audioplayers: ^6.6.0
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.1.2
  easy_localization: ^3.0.8
  file_picker: ^10.3.10
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  record: ^6.2.0
  shared_preferences: ^2.5.4
  sqflite_common_ffi: ^2.4.0+2
  supabase_flutter: ^2.9.0
  url_launcher: ^6.3.2
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash.png
  color_dark: "#281e55"
  image_dark: assets/images/splash_dark.png

  android_12:
    image: assets/images/splash.png
    icon_background_color: "#ffffff"
    image_dark: assets/images/splash_dark.png
    icon_background_color_dark: "#281e55"

  android: true
  ios: true
  web: false